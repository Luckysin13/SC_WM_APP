<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OSSC - Premium Smoker Controller Dashboard">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OSSC">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OSSC | Smoker Controller</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0F0F11;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #FFFFFF;
    }

    .loader-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #FF6B00 0%, #FF9E00 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 107, 0, 0.1);
      border-top: 3px solid #FF6B00;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .loading-text {
      font-size: 14px;
      font-weight: 500;
      color: #9BA1A6;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="logo">OSSC</div>
    <div class="spinner"></div>
    <div class="loading-text">Initializing Dashboard</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
